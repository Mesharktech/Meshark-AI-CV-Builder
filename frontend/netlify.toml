[build]
  command = "node env-check.js && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Redirects for Single Page Applications (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
