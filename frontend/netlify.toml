# Use Node.js runtime
[build]
  command = "npm run build"
  publish = "dist"
  ignore = "false"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

# Fallback routing for Single Page Applications (React Router, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
